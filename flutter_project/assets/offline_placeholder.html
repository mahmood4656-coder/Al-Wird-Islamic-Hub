<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Wird Islamic Hub - Offline Mode</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #FCFBF8;
            color: #2D312E;
            margin: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            text-align: center;
        }
        .container {
            max-width: 450px;
            padding: 24px;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid #EAE8E3;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 16px;
            color: #4A6741;
        }
        h1 {
            font-size: 20px;
            margin: 0 0 12px 0;
            color: #4A6741;
            font-weight: 700;
        }
        p {
            font-size: 14px;
            line-height: 1.6;
            color: #626A64;
            margin: 0 0 24px 0;
        }
        button {
            background-color: #4A6741;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #3B5234;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🕌</div>
        <h1>موجہ رابطہ معدوم / Offline</h1>
        <p>
            Al-Wird Islamic Hub requires an internet connection to stream blessed Quran recitations and fetch real-time prayer timings. 
            However, your downloaded audios and local Tasbih counts remain fully accessible.
        </p>
        <button onclick="window.location.reload()">Reconnect with Al-Wird</button>
    </div>
</body>
</html>
