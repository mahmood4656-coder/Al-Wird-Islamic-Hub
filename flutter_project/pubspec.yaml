name: al_wird_clean
description: A fresh clean Flutter wrapper for Al-Wird.
# Verified, aligned with latest Android dependencies & modern Built-In Kotlin - 2026-05-31
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.12.0
  path_provider: ^2.1.3
  http: ^1.2.1
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/offline_placeholder.html
    - assets/dist/
    - assets/dist/assets/
