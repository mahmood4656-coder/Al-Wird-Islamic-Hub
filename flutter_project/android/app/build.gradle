// Verified Android-35 configurations & SDK compile/target attributes - 2026-05-31
plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0.0'
}

android {
    namespace "com.alwird.islamichub"
    compileSdk 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.alwird.islamichub"
        minSdk 21
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        release {
            // These can be populated in key.properties for secure compilation
            // Supports generating signed Play Store compatible (.aab) App Bundles.
            def keystoreFile = file("release-keystore.jks")
            if (keystoreFile.exists()) {
                storeFile keystoreFile
                storePassword System.getenv("PLAY_STORE_KEYSTORE_PASSWORD") ?: "alwirdpassword"
                keyAlias "alwird-alias"
                keyPassword System.getenv("PLAY_STORE_KEY_PASSWORD") ?: "alwirdpassword"
            }
        }
    }

    buildTypes {
        release {
            if (file("release-keystore.jks").exists()) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // The org.jetbrains.kotlin.android plugin automatically manages the standard library compatibility alignment.
    implementation "androidx.annotation:annotation:1.8.0"
    implementation "androidx.core:core-ktx:1.13.1"
}
